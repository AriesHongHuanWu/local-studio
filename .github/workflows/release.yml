name: Release

# Build + sign Ai Caption on native runners for every OS and publish ONE
# GitHub Release containing all platforms' installers AND a single, merged,
# multi-platform updater `latest.json`.
#
# This is the ONLY way to produce macOS/Linux packages: Tauri cannot
# cross-compile a macOS/Linux bundle from Windows. Each matrix leg builds on
# its own native runner, uploads its installers + minisign `.sig` files to the
# release keyed by the pushed tag, and merges its platform entry into
# `latest.json`. Publish the resulting draft to flip it to "Latest" — the
# updater endpoint (`releases/latest/download/latest.json`) then serves it.
#
# Trigger: push a `v*` tag (e.g. `v0.2.0`), or run manually via
# workflow_dispatch with a tag input (the tag must already exist).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build + release (e.g. v0.2.0)"
        required: true
        type: string

# Required for tauri-action to create the release and upload assets.
permissions:
  contents: write

# Don't let two runs of the same tag fight over the same release / latest.json.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build · ${{ matrix.platform }} ${{ matrix.label }}
    permissions:
      contents: write
    strategy:
      # One OS failing must NOT abort the others — you still get the platforms
      # that succeeded, and re-running a failed leg merges back into the same
      # release / latest.json.
      fail-fast: false
      matrix:
        include:
          # macOS — split per-arch (native-size binaries, both arches covered).
          # Produces two DMGs + two darwin-* updater keys (app.tar.gz).
          # arm64 builds natively on macos-latest (Apple Silicon).
          - platform: "macos-latest"
            label: "(arm64)"
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            rust-targets: "aarch64-apple-darwin"
          # x86_64 builds on macos-13, which is an Intel (x86_64-native) runner.
          # macos-latest is now Apple Silicon, so building x86_64 there is a
          # cross-compile that yields an unvalidated .app; macos-13 avoids that.
          - platform: "macos-13"
            label: "(x86_64)"
            args: "--target x86_64-apple-darwin --bundles app,dmg"
            rust-targets: "x86_64-apple-darwin"
          # Linux — build on the OLDEST glibc/WebKitGTK we support. ubuntu-22.04
          # ships WebKitGTK 4.1 (Tauri v2's requirement); a 24.04-built AppImage
          # would NOT run on 22.04. AppImage is the Linux updater format; deb is
          # the convenient installer.
          - platform: "ubuntu-22.04"
            label: "(x86_64)"
            args: "--bundles deb,appimage"
            rust-targets: ""
          # Windows — NSIS is the updater format (updaterJsonPreferNsis points
          # latest.json at it); MSI is for manual installs.
          - platform: "windows-latest"
            label: "(x86_64)"
            args: "--bundles nsis,msi"
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (includes backend/ source for bundle.resources)
        uses: actions/checkout@v4
        with:
          # workflow_dispatch passes a tag explicitly; tag pushes are already
          # on the right ref.
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Fail fast if the pushed tag doesn't match tauri.conf.json `version`.
      # tauri-action derives latest.json's `version` and the installer
      # FILENAMES from tauri.conf.json `version`, NOT from tagName — tagName
      # only names the release/tag and the download URL path. If they diverge
      # (e.g. you tagged v0.2.0 but forgot to bump the config off 0.1.0), CI
      # stays green and a release publishes, but the updater compares
      # latest.json.version (0.1.0) to installs and silently offers NO update.
      # This guard turns that quiet footgun into a loud, early failure.
      - name: Verify tag matches tauri.conf.json version
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          tag_version="${tag#v}"
          config_version="$(jq -r .version frontend/src-tauri/tauri.conf.json)"
          echo "tag version:    $tag_version"
          echo "config version: $config_version"
          if [ "$tag_version" != "$config_version" ]; then
            echo "::error::Tag '$tag' (version '$tag_version') does not match frontend/src-tauri/tauri.conf.json version '$config_version'. Bump tauri.conf.json (+ package.json + Cargo.toml) to '$tag_version' and re-tag — otherwise latest.json and the installer filenames carry '$config_version' and the updater offers no update."
            exit 1
          fi

      # Tauri v2 Linux build deps (WebKitGTK 4.1 toolchain). macOS/Windows
      # runners already have everything Tauri needs.
      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only macOS needs explicit cross-targets; Windows/Linux build their
          # host target, so this is empty for them.
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build (src-tauri)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./frontend/src-tauri -> target"

      # `npm install` (NOT `npm ci`): the committed package-lock.json is
      # generated on Windows, and npm's platform-specific optional deps
      # (rollup / esbuild native binaries) make a strict `npm ci` fail on the
      # Linux/macOS runners. `install` resolves the right per-platform deps.
      # (This mirrors the project's CI workflow.)
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # Portable Python — bundle a python-build-standalone interpreter into the
      # installer so END USERS don't need to install Python. Staged into
      # frontend/src-tauri/resources/python/ (gitignored) and picked up by the
      # tauri.conf.json `resources/python/**/*` glob. If this step is ever
      # removed, the app still works — it falls back to system Python.
      - name: Fetch portable Python (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/fetch-portable-python.ps1

      - name: Fetch portable Python (macOS / Linux)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/fetch-portable-python.sh
          ./scripts/fetch-portable-python.sh

      - name: Build, sign, and publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Updater (minisign) signing — REQUIRED on every OS. -------------
          # This is what makes `createUpdaterArtifacts: true` emit a `.sig`
          # next to each updater bundle (*-setup.exe.sig, *.app.tar.gz.sig,
          # *.AppImage.sig). tauri-action reads those and writes them into
          # latest.json's `signature` fields, verified client-side against the
          # pubkey in tauri.conf.json. Independent of OS code-signing: the
          # updater chain is fully signed even with zero Apple/Windows signing.
          # TAURI_SIGNING_PRIVATE_KEY = contents of
          #   frontend/.tauri-keys/autolyrics.key
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD = "" (key has no passphrase; the
          #   secret must still EXIST so the build doesn't prompt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS code-signing + notarization (OPTIONAL). ------------------
          # Without these, the macOS .app/.dmg is ad-hoc signed: it installs but
          # Gatekeeper shows "unidentified developer" (right-click → Open, or
          # `xattr -dr com.apple.quarantine`). The minisign updater .sig still
          # works, so auto-update is UNAFFECTED — only the first-install OS
          # trust prompt differs. To notarize, add a paid Developer ID cert and
          # uncomment ONE of the two notarization paths below.
          #
          # Cert import (always needed to notarize):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}                 # base64 of the .p12
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}       # "Developer ID Application: Name (TEAMID)"
          # KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          #
          # Notarize via Apple ID (path A):
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                       # app-specific password
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #
          # OR notarize via App Store Connect API key (path B):
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}                         # key id
          # APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}              # path to the .p8
        with:
          # Tauri project root (src-tauri lives under frontend/). Essential —
          # without it the action can't find src-tauri.
          projectPath: frontend
          # Reuse the pushed tag (or the dispatch input). Don't use __VERSION__.
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Ai Caption ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "See assets to download and install. Ai Caption sets up its local Python engine (and CUDA torch where an NVIDIA GPU is present) on first launch."
          # Draft so all 4 legs can write the same release/latest.json without a
          # half-finished release going live. PUBLISH manually once every leg is
          # green — publishing flips it to "Latest", which the updater endpoint
          # (releases/latest/download/latest.json) resolves to.
          releaseDraft: true
          prerelease: false
          # Default true — this is the input that produces + merges latest.json.
          # (The old name `includeUpdaterJson` does NOT exist on current
          # tauri-action; uploadUpdaterJson is the correct one.)
          uploadUpdaterJson: true
          # With both NSIS + MSI built, point latest.json's windows entry at the
          # NSIS updater bundle (MSI is not an updater format).
          updaterJsonPreferNsis: true
          # Per-row bundle targets (+ macOS cross-target). Overrides config.
          args: ${{ matrix.args }}

  # The release is published as a DRAFT so all legs can write the same
  # release/latest.json. GitHub does NOT treat a draft as "Latest", so the
  # updater endpoint (releases/latest/download/latest.json) keeps serving the
  # PREVIOUS release until a human publishes the draft. Surface that manual
  # step prominently in the Actions summary so it can't be silently forgotten.
  draft-ready:
    name: Draft ready — review + PUBLISH
    needs: release
    # Run even if some legs failed, as long as the build job didn't get
    # cancelled — a partial release still produces a draft worth reviewing.
    if: ${{ always() && needs.release.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Announce manual publish step
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          {
            echo "## 🚀 Draft release \`$tag\` is ready"
            echo ""
            echo "The release was published as a **draft** — it is NOT yet served by the updater."
            echo ""
            echo "**Before it goes live, do this manually:**"
            echo ""
            echo "1. Open **Releases** → the draft **Ai Caption $tag**."
            echo "2. Confirm \`latest.json\` has all platform keys (\`windows-x86_64\`, \`darwin-aarch64\`, \`darwin-x86_64\`, \`linux-x86_64\`), each with a non-empty \`signature\`."
            echo "3. **Publish** the draft (this flips it to *Latest*, so \`releases/latest/download/latest.json\` starts serving it)."
            echo ""
            if [ "${{ needs.release.result }}" != "success" ]; then
              echo "> ⚠️ At least one build leg did **not** succeed (result: \`${{ needs.release.result }}\`). The draft may be missing platforms — review before publishing or re-run the failed leg."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
