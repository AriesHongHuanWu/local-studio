name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # `npm install` (not `npm ci`): no committed lockfile — npm's
      # platform-specific optional deps (rollup/esbuild) make a Windows
      # lock fail on Linux. install resolves per-platform.
      - run: npm install
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  backend:
    name: Backend · syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Compile-only: the heavy ML deps (torch/demucs/faster-whisper) are
      # NOT installed in CI — every module is written to import-degrade
      # gracefully when they're absent, so byte-compilation is the right gate.
      - name: Byte-compile pipeline + app
        run: python -m compileall -q backend/pipeline backend/app.py
